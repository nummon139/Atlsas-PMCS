<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS PMSC // SECURE LOGIN PORTAL</title>
    <style>
        :root {
            --bg-black: #050508;
            --primary-red: #da0012;
            --text-light: #ffffff;
            --text-muted: #555566;
            --border-color: #22222a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body {
            background-color: var(--bg-black);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(218, 0, 18, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(218, 0, 18, 0.02) 1px, transparent 1px);
            background-size: 20px 20px; z-index: 1;
        }
        .login-panel {
            background: #0d0d13;
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--primary-red);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 5px; text-align: center; margin-bottom: 30px; }
        .logo span { color: var(--primary-red); }
        .form-group { margin-bottom: 20px; }
        .form-input {
            width: 100%; padding: 12px; background: #050508; border: 1px solid var(--border-color);
            color: #fff; font-family: monospace; font-size: 14px;
        }
        .form-input:focus { border-color: var(--primary-red); outline: none; }
        .btn-login {
            background: var(--primary-red); color: #fff; width: 100%; padding: 14px;
            font-weight: bold; border: none; cursor: pointer; letter-spacing: 2px; font-size: 14px;
            transition: 0.3s;
        }
        .btn-login:hover { background: #b5000f; box-shadow: 0 0 15px rgba(218, 0, 18, 0.4); }
        .footer-text { text-align: center; color: var(--text-muted); font-size: 10px; margin-top: 25px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="login-panel">
        <div class="logo">ATLAS<span>//PMSC</span></div>
        
        <form onsubmit="window.location.href='overview.html'; return false;">
            <div class="form-group">
                <input type="text" class="form-input" placeholder="ENTER OPERATOR ID" value="ATLAS_OPERATOR_01" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" placeholder="ENTER SECURITY KEY" value="••••••••" required>
            </div>
            <button type="submit" class="btn-login">BYPASS & ENTER MAIN SYSTEM</button>
        </form>

        <div class="footer-text">SECURE TERMINAL // UNRESOLVED IDENTITY WILL BE TERMINATED</div>
    </div>

</body>
</html>
