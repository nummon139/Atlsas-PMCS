<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Secure Mainframe Login</title>
    <style>
        :root {
            --bg-dark: #050507;
            --primary-red: #da0012;
            --border-color: #331014;
            --text-muted: #71717a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--bg-dark); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(218,0,18,0.03) 1%, transparent 80%);
            animation: radarRotate 20s linear infinite; z-index: 1;
        }
        @keyframes radarRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .login-box { width: 450px; background: #0c0c10; border: 2px solid var(--primary-red); padding: 40px; z-index: 10; box-shadow: 0 0 30px rgba(218, 0, 18, 0.15); position: relative; }
        .login-box::before { content: "CLASSIFIED SYSTEM"; position: absolute; top: -12px; left: 20px; background: var(--bg-dark); padding: 0 10px; color: var(--primary-red); font-size: 12px; font-weight: bold; letter-spacing: 2px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; letter-spacing: 5px; margin-bottom: 5px; }
        .header h1 span { color: var(--primary-red); }
        .threat-alert { font-size: 11px; background: rgba(218, 0, 18, 0.1); border: 1px solid var(--primary-red); padding: 5px; color: var(--primary-red); font-weight: bold; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .form-input { width: 100%; padding: 12px; background: #050507; border: 1px solid #2a2a35; color: #00ff33; font-family: monospace; margin-bottom: 20px; font-size: 14px; }
        .form-input:focus { border-color: var(--primary-red); outline: none; }
        
        .btn-login { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--primary-red); color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-login:hover { background: var(--primary-red); box-shadow: 0 0 15px rgba(218,0,18,0.5); }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="header">
            <h1>ATLAS<span>.💻</span></h1>
            <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 15px;">SECURE INTRANET MAINFRAME v8.4</p>
            <div class="threat-alert">CRITICAL WARNING: THREAT LEVEL DEFCON 2</div>
        </div>

        <form onsubmit="window.location.href='index.html'; return false;">
            <input type="text" class="form-input" placeholder="ENTER OPERATOR ID" value="ATLAS_OPERATOR_01" required>
            <input type="password" class="form-input" placeholder="ENTER SECURITY KEY PASS" value="••••••••" required>
            <button type="submit" class="btn-login">BYPASS & ENTER MAIN SYSTEM</button>
        </form>
        
        <p style="font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 15px;">(กดปุ่มสีแดงเพื่อจำลองการเข้าสู่ระบบ)</p>
    </div>

</body>
</html>
